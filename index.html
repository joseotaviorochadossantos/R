<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle do Amor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-container">
        <header>
            <h1>Puzzle do Amor</h1>
            <p>Ajude a Raissa a encontrar os pares apaixonados. Toque nas cartas e combine os símbolos.</p>
        </header>

        <section class="score-panel" aria-live="polite" aria-atomic="true">
            <div>
                <strong>Pares encontrados:</strong>
                <span id="score">0</span>/6
            </div>
            <div>
                <strong>Jogadas:</strong>
                <span id="moves">0</span>
            </div>
        </section>

        <section id="board" class="board" aria-label="Tabuleiro de cartas do puzzle"></section>

        <div class="controls">
            <button id="startButton">Começar</button>
            <button id="resetButton">Reiniciar</button>
        </div>

        <p id="message" class="message">Toque em duas cartas para ver o símbolo. Encontre todos os pares para ganhar.</p>
    </main>

    <div id="victoryOverlay" class="overlay" aria-live="polite" aria-atomic="true">
        <div class="overlay-card">
            <p>Agora o par que falta mesmo e </p>
            <h2>Raissa e o Zé</h2>
            <button id="closeOverlay" type="button">Jogar de novo</button>
        </div>
    </div>

    <script src="java.js"></script>
</body>
</html>
